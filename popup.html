<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="color-scheme" content="light dark" />
    <title>Resize</title>
    <style>
      :root {
        --bg: #fafafa;
        --fg: #0a0a0a;
        --neutral-100: #f0f0f0;
        --neutral-300: #d4d4d4;
        --neutral-500: #888888;
        --neutral-700: #404040;
        --muted: var(--neutral-500);
        --rule: var(--neutral-300);
        --rule-strong: var(--neutral-700);
        --accent: #e30613;
        --hover: var(--neutral-100);
        --selected: #fdf0f0;
        --font: "Helvetica Now Text", "Helvetica Neue", Helvetica, Arial,
          sans-serif;
        --font-display: "Helvetica Now Display", "Helvetica Now Text",
          "Helvetica Neue", Helvetica, Arial, sans-serif;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0a0a0a;
          --fg: #fafafa;
          --neutral-100: #161616;
          --neutral-300: #2a2a2a;
          --neutral-500: #6e6e6e;
          --neutral-700: #a3a3a3;
          --muted: var(--neutral-500);
          --rule: var(--neutral-300);
          --rule-strong: var(--neutral-700);
          --accent: #ff3b30;
          --hover: var(--neutral-100);
          --selected: #1a0808;
        }
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
      }

      body {
        width: 360px;
        font-family: var(--font);
        font-size: 13px;
        line-height: 1.4;
        color: var(--fg);
        background: var(--bg);
        font-feature-settings: "tnum" 1, "kern" 1, "ss01" 1;
        -webkit-font-smoothing: antialiased;
        box-shadow: inset 0 1px 0 var(--rule);
      }

      /* ------------------------------------------------------------------ */
      /*  Header                                                             */
      /* ------------------------------------------------------------------ */

      .header {
        padding: 24px 20px 18px;
        border-bottom: 1px solid var(--rule);
      }

      .brand {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
      }

      .wordmark {
        display: inline-flex;
        align-items: center;
        font-family: var(--font-display);
        font-size: 28px;
        font-weight: 700;
        letter-spacing: -0.035em;
        line-height: 1;
        margin: 0;
      }

      .brand-mark {
        width: 24px;
        height: 24px;
        margin-right: 12px;
        flex-shrink: 0;
        color: var(--bg);
        display: block;
      }

      .stamp {
        font-size: 10px;
        font-weight: 500;
        letter-spacing: 0.1em;
        color: var(--neutral-500);
        font-variant-numeric: tabular-nums;
      }

      /* ------------------------------------------------------------------ */
      /*  Preset list                                                        */
      /* ------------------------------------------------------------------ */

      .presets {
        max-height: 360px;
        overflow-y: auto;
      }

      .presets::-webkit-scrollbar {
        width: 0;
      }

      .group {
        border-top: 1px solid var(--rule);
      }

      .group-header {
        position: sticky;
        top: 0;
        z-index: 2;
        padding: 6px 20px;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted);
        background: color-mix(in srgb, var(--neutral-100) 78%, transparent);
        backdrop-filter: saturate(180%) blur(12px);
        -webkit-backdrop-filter: saturate(180%) blur(12px);
        box-shadow: inset 0 -1px 0 transparent;
        transition: box-shadow 0.18s ease;
      }

      .group-header.stuck {
        box-shadow: inset 0 -1px 0 var(--rule);
      }

      .preset {
        display: grid;
        grid-template-columns: 22px 1fr auto;
        gap: 14px;
        align-items: center;
        width: 100%;
        padding: 8px 20px;
        background: transparent;
        border: none;
        color: var(--fg);
        font: inherit;
        font-size: 13px;
        text-align: left;
        cursor: pointer;
        transition: background 0.08s linear, color 0.08s linear,
          transform 0.05s linear;
      }

      .preset-num {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.05em;
        color: var(--accent);
        font-variant-numeric: tabular-nums;
      }

      .preset:hover {
        background: var(--hover);
      }

      .preset:active {
        transform: translateY(0.5px);
      }

      .preset.selected {
        background: var(--selected);
      }

      .preset.selected .preset-name,
      .preset.selected .preset-dim {
        color: var(--accent);
      }

      .preset.current {
        position: relative;
      }

      .preset.current::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 3px;
        background: var(--accent);
      }

      .preset-name {
        font-weight: 500;
        letter-spacing: -0.005em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .preset-dim {
        font-size: 12px;
        font-weight: 400;
        color: var(--muted);
        font-variant-numeric: tabular-nums;
        letter-spacing: 0.01em;
        white-space: nowrap;
        text-align: right;
      }

      .dim-sep {
        margin: 0 6px;
        color: var(--neutral-300);
      }

      .preset.selected .preset-dim,
      .preset:hover .preset-dim {
        color: var(--fg);
      }

      .preset.selected .preset-dim {
        color: var(--accent);
      }

      .preset.selected .dim-sep,
      .preset:hover .dim-sep {
        color: var(--muted);
      }

      .preset.selected .dim-sep {
        color: var(--accent);
      }

      /* ------------------------------------------------------------------ */
      /*  Custom row (inline editor inside preset list)                      */
      /* ------------------------------------------------------------------ */

      .preset.custom-row {
        cursor: text;
      }

      .preset.custom-row:hover {
        background: transparent;
      }

      .dim-input {
        appearance: none;
        -moz-appearance: textfield;
        width: 44px;
        padding: 1px 0;
        font: inherit;
        font-size: 12px;
        font-variant-numeric: tabular-nums;
        letter-spacing: 0.01em;
        color: var(--fg);
        background: transparent;
        border: none;
        border-bottom: 1px solid var(--rule);
        outline: none;
        text-align: right;
        caret-color: var(--accent);
        transition: border-color 0.12s;
      }

      .dim-input:focus {
        border-bottom-color: var(--accent);
      }

      .dim-input::placeholder {
        color: var(--neutral-300);
      }

      .dim-input::-webkit-outer-spin-button,
      .dim-input::-webkit-inner-spin-button {
        appearance: none;
        margin: 0;
      }

      /* ------------------------------------------------------------------ */
      /*  Toast                                                              */
      /* ------------------------------------------------------------------ */

      .toast {
        position: fixed;
        left: 20px;
        right: 20px;
        bottom: 16px;
        padding: 10px 16px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--bg);
        background: color-mix(in srgb, var(--fg) 82%, transparent);
        backdrop-filter: blur(14px) saturate(140%);
        -webkit-backdrop-filter: blur(14px) saturate(140%);
        border-radius: 0;
        opacity: 0;
        transform: translateY(6px);
        pointer-events: none;
        transition: opacity 0.15s ease, transform 0.15s ease;
        z-index: 1000;
        font-variant-numeric: tabular-nums;
      }

      .toast.visible {
        opacity: 1;
        transform: translateY(0);
      }

      .toast.error {
        background: color-mix(in srgb, var(--accent) 88%, transparent);
        color: #ffffff;
      }

      /* ------------------------------------------------------------------ */
      /*  Status bar                                                         */
      /* ------------------------------------------------------------------ */

      .status-bar {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        height: 2px;
        background: var(--accent);
        transform: scaleX(0);
        transform-origin: 0 0;
        opacity: 0;
        pointer-events: none;
        z-index: 1001;
      }

      .status-bar.filling {
        transform: scaleX(1);
        opacity: 1;
        transition: transform 280ms cubic-bezier(0.16, 1, 0.3, 1), opacity 0ms;
      }

      .status-bar.fading {
        transform: scaleX(1);
        opacity: 0;
        transition: opacity 220ms ease-out 60ms;
      }

      @media (prefers-reduced-motion: reduce) {
        * {
          transition: none !important;
          animation: none !important;
        }
      }
    </style>
  </head>

  <body>
    <header class="header">
      <div class="brand">
        <h1 class="wordmark">
          <svg class="brand-mark" width="24" height="24" viewBox="0 0 24 24" aria-hidden="true">
            <rect x="1.25" y="7.25" width="20.5" height="15.5" fill="#e30613" stroke="currentColor" stroke-width="1.5"/>
            <path d="M23.25 1.25V17.25H12.75V1.25H23.25Z" fill="#e30613" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          Resize
        </h1>
        <span class="stamp" id="stamp">v 0.4 / 1</span>
      </div>
    </header>

    <section class="presets" id="presets"></section>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <div class="status-bar" id="status-bar" aria-hidden="true"></div>

    <script src="popup.js"></script>
  </body>
</html>
